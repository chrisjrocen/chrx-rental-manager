<!-- 2 & 3a. Forgot password (request) -->
    <!-- 2 & 3a. Forgot password (request) -->
    <div style="display:flex;flex-direction:column;gap:11px">
      <div style="font-size:12px;font-weight:700;color:#5b6270" id="3b">02 · Forgot password <span style="color:#9aa0aa;font-weight:500">— request reset</span></div>
      <div style="width:420px;background:#fff;border:1px solid #d4d7dd;border-radius:10px;overflow:hidden;box-shadow:0 14px 34px -18px rgba(20,30,50,.4)">
        <div style="height:34px;background:#e9ebef;display:flex;align-items:center;gap:7px;padding:0 13px;border-bottom:1px solid #d4d7dd">
          <span style="width:11px;height:11px;border-radius:50%;background:#ec6a5e"></span><span style="width:11px;height:11px;border-radius:50%;background:#f4bf50"></span><span style="width:11px;height:11px;border-radius:50%;background:#61c454"></span>
        </div>
        <div style="height:520px;background:#f0f0f1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px">
          <svg width="36" height="36" sc-camel-view-box="0 0 24 24" fill="none" stroke="#1d2327" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:18px"><path d="M3 9.5L12 3l9 6.5"></path><path d="M5 10v10h14V10"></path></svg>
          <div style="width:326px;background:#fff;border:1px solid #c3c4c7;border-radius:4px;padding:26px 24px;box-shadow:0 1px 3px rgba(0,0,0,.06)">
            <p style="font-size:13px;color:#50575e;margin:0 0 18px;line-height:1.5">Enter your email and we'll send you a link to reset your password.</p>
            <label style="display:block;font-size:14px;margin-bottom:5px">Email address</label>
            <input value="tenant@example.com" readonly="" style="width:100%;box-sizing:border-box;padding:9px 10px;border:1px solid #8c8f94;border-radius:3px;font-size:15px;margin-bottom:18px">
            <button style="width:100%;background:#2271b1;color:#fff;border:none;border-radius:3px;padding:10px;font-size:14px;font-weight:600;cursor:pointer">Send reset link</button>
          </div>
          <div style="margin-top:16px;font-size:13px"><a href="#secA">← Back to log in</a></div>
        </div>
      </div>
    </div>
