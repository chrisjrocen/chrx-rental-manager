<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>07. Add/Edit Property form — Chrx Rental Manager design reference</title>
<style>
body{margin:0;background:#e7e9ee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;color:#1d2327;padding:40px;}
a{color:#2271b1;text-decoration:none;}
a:hover{color:#135e96;}

  body{margin:0;background:#e7e9ee;}
  a{color:#2271b1;text-decoration:none;}
  a:hover{color:#135e96;}
  @keyframes rmShimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}

</style>
</head>
<body>
<!-- 07. Add/Edit Property form -->
    <!-- 07. Add/Edit Property form -->
    <div style="display:flex;flex-direction:column;gap:11px">
      <div style="font-size:12px;font-weight:700;color:#5b6270">07 · Add / Edit Property <span style="color:#9aa0aa;font-weight:500">— form with validation state</span></div>
      <div style="width:1280px;background:#fff;border:1px solid #d4d7dd;border-radius:10px;overflow:hidden;box-shadow:0 16px 40px -22px rgba(20,30,50,.45)">
        <div style="height:34px;background:#e9ebef;display:flex;align-items:center;gap:7px;padding:0 13px;border-bottom:1px solid #d4d7dd">
          <span style="width:11px;height:11px;border-radius:50%;background:#ec6a5e"></span><span style="width:11px;height:11px;border-radius:50%;background:#f4bf50"></span><span style="width:11px;height:11px;border-radius:50%;background:#61c454"></span>
        </div>
        <div style="height:820px">
          <dc-import name="AdminShell" active-nav="properties" hint-size="100%,100%">
            <div style="font-size:12px;color:#646970;margin-bottom:6px"><a href="#">Properties</a> › Add new</div>
            <h1 style="font-size:23px;font-weight:600;margin:0 0 18px">Add Property</h1>
            <div style="max-width:720px;background:#fff;border:1px solid #dcdcde;border-radius:6px;padding:24px">
              <div style="margin-bottom:18px"><label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px">Property name</label><input value="Baobab Residences" style="width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid #8c8f94;border-radius:4px;font-size:14px"></div>
              <div style="margin-bottom:18px"><label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px">Street address</label><input style="width:100%;box-sizing:border-box;padding:8px 10px;border:2px solid #b32d2e;border-radius:4px;font-size:14px;background:#fdf5f5"><div style="font-size:12px;color:#b32d2e;margin-top:5px;font-weight:600">⚠ Address is required.</div></div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px">
                <div><label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px">City</label><input value="Accra" style="width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid #8c8f94;border-radius:4px;font-size:14px"></div>
                <div><label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px">Landlord-Owner</label><sc-raw-select style="width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid #8c8f94;border-radius:4px;font-size:14px;background:#fff"><option>D. Appiah</option><option>R. Adjei</option></sc-raw-select></div>
              </div>
              <div style="margin-bottom:18px"><label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px">Assigned staff</label><div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center"><span style="background:#e4eefa;color:#135e96;padding:4px 10px;border-radius:14px;font-size:12px;font-weight:600">A. Mensah ✕</span><span style="background:#e4eefa;color:#135e96;padding:4px 10px;border-radius:14px;font-size:12px;font-weight:600">J. Tetteh ✕</span><button style="background:#f6f7f7;border:1px dashed #8c8f94;border-radius:14px;padding:4px 12px;font-size:12px;color:#646970;cursor:pointer">+ Add staff</button></div></div>
              <div style="margin-bottom:22px"><label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px">Notes <span style="color:#8c8f94;font-weight:400">(optional)</span></label><textarea rows="3" style="width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid #8c8f94;border-radius:4px;font-size:14px;resize:vertical">Gated compound, borehole water, on-site caretaker.</textarea></div>
              <div style="display:flex;gap:10px;border-top:1px solid #f0f0f1;padding-top:18px"><button style="background:#2271b1;color:#fff;border:none;border-radius:4px;padding:9px 18px;font-size:14px;font-weight:600;cursor:pointer">Save Property</button><button style="background:#f6f7f7;color:#50575e;border:1px solid #c3c4c7;border-radius:4px;padding:9px 18px;font-size:14px;cursor:pointer">Cancel</button></div>
            </div>
          </dc-import>
        </div>
      </div>
    </div>
</body>
</html>
