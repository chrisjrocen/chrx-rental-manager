<meta charset="utf-8">
<title>30. Lease details — Chrx Rental Manager design reference</title>
<style>
body{margin:0;background:#e7e9ee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;color:#1d2327;padding:40px;}
a{color:#2271b1;text-decoration:none;}

  body{margin:0;background:#e7e9ee;}
  a{color:#2271b1;text-decoration:none;}

  @keyframes rmShimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}

</style>

<body>
<!-- 30. Lease details -->
    <!-- 30. Lease details -->
    <div id="30d" style="display:flex;flex-direction:column;gap:11px">
      <div style="font-size:12px;font-weight:700;color:#5b6270">30 · Lease details <span style="color:#9aa0aa;font-weight:500">— mobile</span></div>
      <div style="width:390px;background:#0d1117;border-radius:46px;padding:13px;box-shadow:0 24px 60px -20px rgba(20,30,50,.5)">
        <div style="border-radius:34px;overflow:hidden;background:#f4f6f8;height:788px;display:flex;flex-direction:column;font-family:-apple-system,'Segoe UI',Roboto,sans-serif">
          <div style="background:#0f4c81;color:#fff;flex:0 0 auto;padding:12px 22px 18px">
            <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:14px"><span>9:41</span><span>Sunrise Residents</span></div>
            <div style="display:flex;align-items:center;gap:12px"><span style="font-size:20px">‹</span><span style="font-size:19px;font-weight:800">Lease details</span></div>
          </div>
          <div style="flex:1 1 auto;overflow:auto;padding:18px">
            <div style="background:#fff;border-radius:16px;padding:20px;margin-bottom:16px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><span style="font-size:16px;font-weight:800">Unit B4</span><span style="background:#e5f5eb;color:#0a7d34;padding:4px 11px;border-radius:12px;font-size:12px;font-weight:700">Active</span></div>
              <div style="display:flex;flex-direction:column;gap:15px">
                <div style="display:flex;justify-content:space-between;font-size:14px"><span style="color:#646970">Property</span><span style="font-weight:600">Acacia Court</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px"><span style="color:#646970">Address</span><span style="font-weight:600;text-align:right">14 Ring Road, Accra</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px"><span style="color:#646970">Type</span><span style="font-weight:600">2-bedroom</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px"><span style="color:#646970">Monthly rent</span><span style="font-weight:600">GH₵ 1,800</span></div>
                <div style="display:flex;justify-content:space-between;font-size:14px"><span style="color:#646970">Billing day</span><span style="font-weight:600">1st of month</span></div>
              </div>
            </div>
            <div style="background:#fff;border-radius:16px;padding:20px;margin-bottom:16px">
              <div style="font-size:14px;font-weight:700;margin-bottom:14px">Term</div>
              <div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:12px"><span style="color:#646970">Start</span><span style="font-weight:600">1 Aug 2025</span></div>
              <div style="display:flex;justify-content:space-between;font-size:14px"><span style="color:#646970">End</span><span style="font-weight:600">31 Jul 2026</span></div>
            </div>
            <div style="background:#fff;border-radius:16px;padding:20px">
              <div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:14px;font-weight:700">Deposit</div><div style="font-size:12px;color:#646970;margin-top:3px">GH₵ 3,600</div></div><span style="background:#e5f5eb;color:#0a7d34;padding:4px 11px;border-radius:12px;font-size:12px;font-weight:700">Held</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>
